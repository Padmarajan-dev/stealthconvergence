<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Stealth_conevrgence</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <style>
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0d0d0f;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        font-family: 'Segoe UI', sans-serif;
      }

      #rotate-overlay .phone-icon {
        width: 70px;
        height: 70px;
        animation: rotatePhone 1.8s ease-in-out infinite;
      }

      #rotate-overlay .rotate-title {
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin: 0;
        text-align: center;
      }

      #rotate-overlay .rotate-sub {
        color: #888;
        font-size: 14px;
        margin: -16px 0 0;
        text-align: center;
        letter-spacing: 0.02em;
      }

      #rotate-overlay .ring {
        position: absolute;
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 2px solid rgba(255, 160, 30, 0.25);
        animation: pulse 2s ease-in-out infinite;
      }

      #rotate-overlay .ring2 {
        width: 180px;
        height: 180px;
        border-color: rgba(255, 160, 30, 0.1);
        animation-delay: 0.4s;
      }

      @keyframes rotatePhone {
        0%   { transform: rotate(0deg);  }
        40%  { transform: rotate(90deg); }
        60%  { transform: rotate(90deg); }
        100% { transform: rotate(0deg);  }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1);    opacity: 1;   }
        50%       { transform: scale(1.12); opacity: 0.4; }
      }
    </style>
  </head>
  <body>

    <!-- Rotate Overlay -->
    <div id="rotate-overlay">
      <div class="ring"></div>
      <div class="ring ring2"></div>
      <svg class="phone-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="4" width="32" height="56" rx="6" stroke="#FF9F1C" stroke-width="3.5"/>
        <circle cx="32" cy="52" r="2.5" fill="#FF9F1C"/>
        <rect x="26" y="8" width="12" height="2" rx="1" fill="#FF9F1C" opacity="0.5"/>
      </svg>
      <p class="rotate-title">Rotate Your Device</p>
      <p class="rotate-sub">Please switch to landscape mode to play</p>
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      // ── Orientation Detection ──────────────────────────────────────
      var overlay = document.getElementById('rotate-overlay');
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      function checkOrientation() {
        if (!isMobile) return;
        var isPortrait = window.innerHeight > window.innerWidth;
        overlay.style.display = isPortrait ? 'flex' : 'none';
      }

      checkOrientation();
      window.addEventListener('resize', checkOrientation);
      window.addEventListener('orientationchange', function () {
        setTimeout(checkOrientation, 200);
        setTimeout(checkOrientation, 500);
      });
      setInterval(checkOrientation, 500);
      // ──────────────────────────────────────────────────────────────

      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Stealth_convergence.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Stealth_convergence.data.unityweb",
        frameworkUrl: buildUrl + "/Stealth_convergence.framework.js.unityweb",
        codeUrl: buildUrl + "/Stealth_convergence.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Stealth_conevrgence",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      // config.matchWebGLToCanvasSize = false;

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
